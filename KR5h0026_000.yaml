body:
  text: 髙上玉宸憂樂章結我自然氣凝化紫鳳城髙臺超九領崚𡾓成飛瓊煥落重虛上曲折洞八清紫蓋曜雲宫流暉翳五霞四逹無窮野八氣回圎明扶搖運太空七景轉天經運來若無相時去隨化傾九來交度內二象互相征帝一固中元四綱不頽靈南採飛皇寶北列廣寒庭玄房交真會虛歌自然生五帝命靈幡魔旗徴萬精魔從空中嘯道世樂未央故與曲素辭慶神欣太平相與契何許萬劫為一齡回轉九萬同逰紫鳳軿空生紫鳳臺瓊闕參太微靈風洞八會北牖閶闔開上有嘯歌兒常唱運喪衰朝則乘景逰暮則附景歸二景齊一體常恐失景暉九氣不常居天地有傾危大劫終一椿百六乘運回洪泉湧九嶺大鳥翔天垂萬蠢飄長流顧山不得依號泣無崖際能不傷人懷賢聖誦經故得乘景飛至時相奉迎同會九天扉數盡金馬辰萬癘交橫馳不見覺仙人但能哭尸悲嗟此愚夫質持命痛可哀散憂九玄臺聚樂偕太空攜契十天真笑命東海童四逹八會氣玄運閬臺風日朗西華館意合廣寒宫婆婆紫鳳下蕭條九嶺峯流盻旡窮野仰觀劫刃中清歌宫啇和憂樂自相從二趣諧一契理背友還同相與樂未央持始復持終酣飲玉池醴仰飲飛華皇靈瓜自河宴味若日月光七曜流芳暉斯樂豈可忘大劫有終運運交二象傾龍門斷天河三五友相征赤鎮據東井華蓋伏晨星玄昏暉八荒穢氣翳天精三官相操促五嶽不固靈萬癘交橫馳北帝勇魔兵八綱羅天外聖主乃能清是結自然氣崚𡾓九重城髙觀愍萬兆憂樂從是生玄歌散神襟蒙歡友涕零哀此頑夫輩吝財貪色榮欣欣待命至不顧禍自嬰賢智逆方來晨夜勤誦經禮空念玄虛以度不窮齡若能尋道源八節奏玉名將免九曜災令爾見太平瓊鳳鬱晨飊紫臺曜玉林流光拂重玄嵳峩陵九隂紫景散朱霞飛煙互相尋七寶振瓊條靈獸騁雲岺萬仙乘空詠神仙揚妙音上有髙晨師拱靜嘯與吟八會自然容虛降皆蘭金瓊嚼彌劫旦玉漿散沖心明珠唱靈歌法容和清琴玉章至道宗憂樂解人袊釋我無終齡良娛樂何深自然髙仙韻安能同此欽朝戲東華宫夕逰西華堂取樂二華館不與樂相逢但聞玄歌子悲聲傷天童哀響流寒庭撫悼世運窮天馬踴九河鳥母乘飛龍玄津無橋梁二氣隔不通登我崚𡾓臺仰觀九難中穢氣彌三靈萬兆負災衡八域無遺民大小山嶽崩念此不知學聞經若癡聾相與任運生鯈歘得命終哀災何期酷念子傷我胸紫鳳乘空發崚𡾓九玄嵎氣結則影見氣散則神旡飄飄有無際天樂適我娛安同八會唱齊我髙仙儔携契十天真宴我九鳳軀上登玉京闕下戲閬風州羽騎迅瓊輪紫煙空相扶極朝復待旦階樂無終休流盻任運遷億椿始一周歡我自然襟散我懷世憂自無玄靈寶誰能同此哀逰哉空洞內與樂復發憂朝發東蒙嶺夕觀西隴丘不見九靈母北真道相逰遼問大象度二氣忽云周九龍運東井天馬發西隅北帝放天兵五嶽玄相符萬魔巳束帶五行早相謀兵災羅天布萬兆巳被拘上下皆受會蕩除無稽留哀此五難中運至無親踈髙登八會官結我𡨋中儔歷觀至學者福地以相扶棄家尋我道剋得度爾軀勤心修至經道成當須逍遙觀鳳臺豈不樂哉逰大樂會中元中元聚樂庭上有八會氣婆娑紫鳳生金條附玉根七寶結華鈴龍超極峯嶺鳳嘯駭程不見離逰賔但聞鳳雲生宫啇自相和音響自然成玄歌唱妙曲憂樂結成經吾我自相求誰知真人靈錦雲帶夜月紫耀翳飛瓊三晨動太暉七元煥五星靈幡有威光流煙靄紫清自謂西華妙未若紫鳳城上有解襟人一靣歡萬齡偕樂無終劫因覺天地傾靈運自有巳數終自由玄去來順運回何為憂自纒散憂八荒外大象不圭真逍遙歡樂庭誰與憂為親五難是常會所傷自有人宫啇雖不和大歸理自巧故與憂樂曲以度覺道身苦行研靈文妙義自然鮮但佩曲素章剋入無憂津乘空登鳳臺髙觀承唐年此樂將何樂知憂在何聞髙上玉晨憂樂之章空生鳳臺之靈文明于五方金音逸朗于十天玉京九章上真皆鑄金為簡紫筆書文齊聲合唱玄歌憂樂之曲也其辭深頥妙趣洞淵自非髙上之儔莫有能究其篇者金名東華玉字鳳闕乃得見此文爾得佩鳳氣玄丘真書命魔靈幡誦憂樂之章則五帝衛真天魔敬護保舉上仙得奉迎聖君于上清宫逰于鳳臺之堂也凡受此文每以本命太歲八節之日及每月五日十五日二十五日沐浴清齋入室先東向誦青帝章二首畢再禮朝玉真轉南向誦赤章畢再禮朝玉真轉西向誦白帝章畢再禮朝玉真轉北向誦黑帝章畢再禮朝玉真向太嵗誦黃帝章畢再禮朝玉真五方都畢還北向九拜朝玉晨君仰咽氣九過止如此五施五帝幡于室五方出上清髙上玉晨鳳臺曲素上經太上玉宸憂樂章
