body:
  text: 髙上玉宸憂樂章結我自然氣凝化紫鳳城髙臺超九領𡺿𡾓成飛瓊煥落重虚上曲折洞八清紫盖曜雲宫流暉翳五霞四逹無窮野八氣廻圎明扶摇運太空七景轉天經運来若無相時去随化傾九来交度内二象互相征帝一固中元四綱不頽靈南採飛皇寳北列廣寒庭玄房交真㑹虚歌自然生五帝命靈幡魔旗徴萬精魔從空中嘯道世樂未央故與曲素辭慶神欣太平相與契何許萬刧為一齡廻轉九萬同逰紫鳳軿空生紫鳳臺瓊闕參太㣲靈風洞八㑹北牖閶闔開上有嘯歌兒常唱運䘮衰朝則乗景逰暮則附景歸二景齊一體常恐失景暉九炁不常居天地有傾危大刧終一椿百六乗運廻洪泉湧九嶺大鳥翔天垂萬蠢飄長流顧山不得依號泣無崖際䏻不傷人懐賢聖誦經故得乗景飛至時相奉迎同㑹九天扉数盡金馬辰萬癘交横馳不見覺仙人但䏻哭屍悲嗟此愚夫質持命痛可哀散憂九玄臺聚樂偕太空攜契十天真𥬇命東海童四逹八㑹氣玄運閬䑓風日朗西華館意合廣寒宫婆婆紫鳳下蕭條九嶺峯流盻旡窮野仰觀刧刃中清歌宫啇和憂樂自相從二趣諧一契理背友還同相與樂未央持始復持終酣飲玉池醴仰飲飛華皇靈瓜自河宴味若日月光七曜流芳暉斯樂豈可忘大刼有終運運交二象傾龍門断天河三五友相征赤鎮㩀東井華盖伏晨星玄昏暉八荒穢氣翳天精三官相操促五嶽不固靈萬癘交横馳北帝勇魔兵八綱羅天外聖主乃䏻清是結自然氣崚𡾓九重城髙觀愍萬兆憂樂從是生玄歌散神衿蒙歡友涕零哀此頑夫軰悋財貪色榮欣欣待命至不顧禍自嬰賢智逆方来晨夜勤誦經禮空念玄虚以度不窮齡若䏻尋道源八節奏玉名將免九曜災令爾見太平瓊鳳欝晨飊紫䑓曜玉林流光拂重玄嵳峩陵九隂紫景散朱霞飛烟互相尋七寳振瓊條靈獸騁雲岺萬仙乗空詠神仙揚妙音上有髙晨師拱靜嘯與吟八㑹自然容虚降皆蘭金瓊嚼彌刧旦玉漿散冲心明珠唱靈歌法容和清琴玉章至道宗憂樂觧人袊釋我無終齡良娱樂何深自然髙仙韻安䏻同此欽朝戯東華宫夕逰西華堂取樂二華舘不與樂相逢但聞玄歌子悲聲傷天童哀響流寒庭撫悼世運窮天馬踴九河鳥母乗飛龍玄津無橋梁二氣隔不通登我崚𡾓䑓仰觀九難中穢氣彌三靈萬兆負災衡八域無遺民大小山嶽崩念此不知學聞經若痴聾相與任運生鯈歘得命終哀災何期酷念子傷我胸紫鳳乗空發崚𡾓九玄嵎氣結則影見氣散則神旡飄飄有無際天樂適我娱安同八㑹唱齊我髙仙儔携契十天真宴我九鳳軀上登玉京闕下戯閬風州羽騎迅瓊輪紫烟空相扶極朝復待旦階樂無終休流盻任運遷億椿始一周歡我自然衿散我懐世憂自無玄靈寳誰䏻同此哀逰㢤空洞内與樂復發憂朝發東蒙嶺夕觀西隴丘不見九靈母北真道相逰遼問大象度二氣忽云周九龍運東井天馬發西隅北帝放天兵五嶽玄相符萬魔巳束帶五行早相謀兵災羅天布萬兆巳被拘上下皆受㑹蕩除無稽留哀此五難中運至無親踈髙登八㑹官結我𡨋中儔歴觀至學者福地以相扶棄家尋我道剋得度爾軀勤心修至經道成當須逍遥觀鳳臺豈不樂㢤逰大樂㑹中元中元聚樂庭上有八㑹氣婆娑紫鳳生金條附玉根七寳結華鈴龍超極峯嶺鳳嘯駭程不見離逰賔但聞鳳雲生宫啇自相和音響自然成玄歌唱妙曲憂樂結成經吾我自相求誰知真人靈錦雲帶夜月紫耀翳飛瓊三晨動太暉七元煥五星靈幡有威光流烟靄紫清自謂西華妙未若紫鳳城上有觧衿人一靣歡萬齡偕樂無終刼因覺天地傾靈運自有巳数終自由玄去来順運廻何為憂自纒散憂八荒外大象不圭真逍遥歡樂庭誰與憂為親五難是常㑹所傷自有人宫啇雖不和大歸理自巧故與憂樂曲以度覺道身苦行研靈文妙義自然鮮但佩曲素章剋入無憂津乗空登鳳臺髙觀承唐年此樂將何樂知憂在何聞髙上玉晨憂樂之章空生鳳臺之靈文明扵五方金音逸朗扵十天玉京九章上真皆鑄金為簡紫筆書文齊聲合唱玄歌憂樂之曲也其辭深頥妙趣洞淵自非髙上之儔莫有䏻䆒其篇者金名東華玉字鳳闕乃得見此文爾得佩鳳炁玄丘真書命魔靈幡誦憂樂之章則五帝衛真天魔敬護保舉上仙得奉迎聖君扵上清宫逰扵鳳臺之堂也凡受此文每以本命太𡻕八節之日及每月五日十五日二十五日沐浴清齋入室先東向誦青帝章二首畢再禮朝玉真轉南向誦赤章畢再禮朝玉真轉西向誦白帝章畢再禮朝玉真轉北向誦黒帝章畢再禮朝玉真向太嵗誦黄帝章畢再禮朝玉真五方都畢還北向九拜朝玉晨君仰咽炁九過止如此五施五帝幡扵室五方出上清髙上玉晨鳳臺曲素上經太上玉宸憂樂章
